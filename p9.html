<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

<style>
form{
    width:300px;
    margin:auto;
    margin-top:100px;
    font-size:20px;
    font-family:Arial;
}

.btn{
    width:100px;
    font-size:18px;
    font-family:Arial;
    background-color:rgb(2, 2, 10);
    color:white 
}
</style>
</head>

<body>

<form onsubmit="return validate()">

<table>
<tr>
    <td>Username</td>
    <td><input type="text" id="user"></td>
</tr>

<tr>
    <td>Password</td>
    <td><input type="password" id="pass"></td>
</tr>

<tr>
    <td colspan="2">
        <input type="submit" value="Submit" class="btn">
    </td>
</tr>
</table>

</form>

<script>

function validate(){

    let n1 = document.getElementById("user").value;
    let n2 = document.getElementById("pass").value;

    if(n1==""){
        alert("Enter Username");
        return false;
    }

    else if(n2==""){
        alert("Enter Password");
        return false;
    }

    else{
        alert("Login Successful");
        return true;
    }
}

</script>

</body>
</html>
