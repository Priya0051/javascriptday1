<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Validation</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>

</head>

<body>

<form id="frm">

<table>

<tr>
<td>Username</td>
<td><input type="text" name="myname"></td>
</tr>

<tr>
<td>Email</td>
<td><input type="text" name="myemail"></td>
</tr>

<tr>
<td>Age</td>
<td><input type="number" name="myage"></td>
</tr>

<tr>
<td>Password</td>
<td><input type="password" name="mypass" id="pass"></td>
</tr>

<tr>
<td>Confirm Password</td>
<td><input type="password" name="cmypass"></td>
</tr>

<tr>
<td></td>
<td><input type="submit" value="Submit"></td>
</tr>

</table>

</form>


<script>

$(document).ready(function(){

    $.validator.addMethod("pwcheck",
    function(value){
        return /^[A-Za-z0-9\d=!@._*-]*$/.test(value)
        && /[a-z]/.test(value)
        && /\d/.test(value);
    });


    $("#frm").validate({

        rules:{

            myname:{
                required:true
            },

            myemail:{
                required:true,
                email:true
            },

            myage:{
                required:true,
                min:18,
                max:60
            },

            mypass:{
                required:true,
                pwcheck:true,
                minlength:8
            },

            cmypass:{
                required:true,
                equalTo:"#pass"
            }

        },


        messages:{

            myname:{
                required:"This field is mandatory"
            },

            myemail:{
                required:"Enter your email",
                email:"Enter valid email"
            },

            myage:{
                required:"Enter your age",
                min:"Age should be minimum 18",
                max:"Age should be maximum 60"
            },

            mypass:{
                required:"Enter password",
                pwcheck:"Password must contain small letter and number",
                minlength:"Minimum 8 characters required"
            },

            cmypass:{
                required:"Confirm your password",
                equalTo:"Password does not match"
            }

        }

    });

});

</script>

</body>
</html>
