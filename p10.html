<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>

<table border="1">

    <tr>
        <td colspan="4">
            <input type="text" id="txt">
        </td>
    </tr>

    <tr>
        <td><button onclick="num('7')">7</button></td>
        <td><button onclick="num('8')">8</button></td>
        <td><button onclick="num('9')">9</button></td>
        <td><button onclick="num('/')">/</button></td>
    </tr>

    <tr>
        <td><button onclick="num('4')">4</button></td>
        <td><button onclick="num('5')">5</button></td>
        <td><button onclick="num('6')">6</button></td>
        <td><button onclick="num('*')">*</button></td>
    </tr>

    <tr>
        <td><button onclick="num('1')">1</button></td>
        <td><button onclick="num('2')">2</button></td>
        <td><button onclick="num('3')">3</button></td>
        <td><button onclick="num('-')">-</button></td>
    </tr>

    <tr>
        <td><button onclick="num('0')">0</button></td>
        <td><button onclick="num('%')">%</button></td>
        <td><button onclick="evaluateResult()">=</button></td>
        <td><button onclick="num('+')">+</button></td>
    </tr>

    <tr>
        <td colspan="4">
            <button onclick="clr()">C</button>
        </td>
    </tr>

</table>

<script>

function num(n)
{
    document.getElementById("txt").value += n;
}

function clr()
{
    document.getElementById("txt").value = "";
}

function evaluateResult()
{
    let val = document.getElementById("txt").value;

    let result = eval(val);

    document.getElementById("txt").value = result;
}

</script>

</body>
</html>
