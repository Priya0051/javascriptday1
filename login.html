<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <script src="c:\Users\ppy13\OneDrive\Documents\jquery-4.0.0.min.js"></script>
    <style>
        form{
            width: 300px;
            margin: auto;
            margin-top: 100px;
            font-size: 20px;
        }
        .btn{
            width: 20px;
            background-color: rgb(2, 65, 12);
            color: white;
        }
    
    </style>
</head>
<body>
    <table >
        <tr>
            <td>Username</td>
            <td input type="text" id="usr"></td>
        
        </tr>
        <tr>
            <td>Password</td>
            <td input type="text" id="pass"></td>
        
        </tr>
        <tr>
            <td>Confirm Password</td>
            <td input type="text" id="cpass"></td>
            
        </tr>
        <tr>
            <td>Age</td>
            <td input type="number" id="age"></td>
            
        </tr>
        <tr>
            <td>E-mail</td>
            <td input type="text" id="email"></td>
        </tr>
        <tr>
            <td colspan="2">
            <input type="submit" value="Login" class="btn">
            </td>
        </tr>

    </table>
    
</body>
</html>
