<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="txt">
    <br>
    <span id="val"></span>
</body>
<script>
    $(document).ready(function(){
        $(document).keyup(function(){
            n=$('txt').val();
            $('#val').html(n);
        });
    });
</script>
</html>
